name:                app
version:             0.1.0.0
github:              "Bruno-Grosso/Simple-Logistic-System"
license:             BSD-3-Clause
author:              "Bernardo Brust, Bruno Grosso, Luís Ferreira, Cauã Eyer"
maintainer:          "bernardo.toledo.pereira@gmail.com"
copyright:           "2026 Bernardo Brust, Bruno Grosso, Luís Ferreira, Cauã Eyer"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/Bruno-Grosso/Simple-Logistic-System#readme>

dependencies:
- base >= 4.7 && < 5
- servant
- servant-server
- http-types
- aeson
- warp

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  app-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - app

tests:
  app-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - app
